<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media OS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #000;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    main {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    p.subtitle {
      margin-top: 0.75rem;
      font-size: 1.125rem;
    }

    p.status {
      margin-top: 2rem;
      font-size: 0.875rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Media OS</h1>
    <p class="subtitle">Человек и ИИ: разжёванное сложное</p>
    <p class="status">Если вы не нашли место, где всё наконец-то разжевали — создайте его сами.</p>
  </main>
</body>
</html>
